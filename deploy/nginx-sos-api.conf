# nginx vhost for the live ShowOrSow API on the EndPx VPS.
# The box already runs a host-level nginx on 80/443 (serving api.endpx.cloud),
# so ShowOrSow rides that nginx on its own subdomain instead of Caddy.
#
# Install: copy to /etc/nginx/sites-available/, symlink into sites-enabled/,
# `nginx -t && systemctl reload nginx`, then obtain TLS with:
#   certbot --nginx -d sos-api.endpx.cloud
# (certbot rewrites this file to add the listen 443 ssl + cert lines).
#
# No CORS headers here on purpose: the browser reaches this API same-origin via
# Vercel's /api/* rewrite, and the Go backend sets its own credentialed CORS.
server {
    listen 80;
    server_name sos-api.endpx.cloud;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        # WebSocket upgrade (Canton JSON API streams; future-proofing).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }
}
