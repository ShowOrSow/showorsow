# ShowOrSow — persistence overlay for `dpm sandbox`.
#
# `dpm sandbox` loads its bundled sandbox.conf first (participant `sandbox`,
# sequencer `sequencer1`, mediator `mediator1`, synchronizer `synchronizer-1`;
# JSON Ledger API v2 :6864, gRPC ledger-api :6865, all storage = memory), then
# merges THIS file (`-c canton-sandbox.conf`). We override every node's storage
# to Postgres so the whole topology — namespace keys, allocated parties, uploaded
# DARs, and all contracts — survives restarts. Without this, party ids
# (hint::fingerprint) regenerate on every boot and PARTY_APPOPERATOR goes stale.
#
# The store is the local `sos-pg` Docker Postgres (127.0.0.1:5432), a DB per node
# (created once). This is Canton's INTERNAL state only; the app's projections
# still live in Neon via the indexer. The reference sequencer driver refuses H2,
# which is why this is Postgres and not a file store. The DB password is read
# from the CANTON_PG_PASSWORD env var (set via the service's EnvironmentFile) so
# no secret lives in this committed file.

canton {
  participants.sandbox.storage {
    type = postgres
    config {
      dataSourceClass = "org.postgresql.ds.PGSimpleDataSource"
      properties {
        serverName = "127.0.0.1"
        portNumber = "5432"
        databaseName = "canton_participant"
        user = "showorsow"
        password = ${CANTON_PG_PASSWORD}
      }
    }
  }

  sequencers.sequencer1.storage {
    type = postgres
    config {
      dataSourceClass = "org.postgresql.ds.PGSimpleDataSource"
      properties {
        serverName = "127.0.0.1"
        portNumber = "5432"
        databaseName = "canton_sequencer"
        user = "showorsow"
        password = ${CANTON_PG_PASSWORD}
      }
    }
  }

  # The reference sequencer keeps a second, block-store DB of its own.
  sequencers.sequencer1.sequencer.config.storage {
    type = postgres
    config {
      dataSourceClass = "org.postgresql.ds.PGSimpleDataSource"
      properties {
        serverName = "127.0.0.1"
        portNumber = "5432"
        databaseName = "canton_seqdriver"
        user = "showorsow"
        password = ${CANTON_PG_PASSWORD}
      }
    }
  }

  mediators.mediator1.storage {
    type = postgres
    config {
      dataSourceClass = "org.postgresql.ds.PGSimpleDataSource"
      properties {
        serverName = "127.0.0.1"
        portNumber = "5432"
        databaseName = "canton_mediator"
        user = "showorsow"
        password = ${CANTON_PG_PASSWORD}
      }
    }
  }
}
